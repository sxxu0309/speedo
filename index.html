<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Speedo & Clock</title>
    <style>
        :root {
            --neon: #03e9f4;
            --bg: #000;
            --card: #111;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            transition: 0.3s; overflow: hidden;
        }

        body.hud-mode { transform: scaleX(-1); }

        /* 상단 시계 영역 */
        .header-clock {
            padding: 20px; text-align: center;
            border-bottom: 1px solid #222;
        }
        #current-time {
            font-size: 24px; font-weight: 300; letter-spacing: 2px; color: #aaa;
        }

        .container {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; gap: 20px;
        }

        .speed-section { text-align: center; }
        .speed-val { 
            font-size: clamp(120px, 45vw, 320px); 
            font-weight: 900; line-height: 0.8; margin: 0;
            font-variant-numeric: tabular-nums;
        }
        .unit { font-size: 14px; color: #666; letter-spacing: 0.3em; margin-top: 15px; display: block; }

        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            width: 100%; max-width: 500px; gap: 15px;
        }
        .info-box {
            background: var(--card); padding: 15px; border-radius: 15px;
            text-align: center; border: 1px solid #222;
        }
        .info-label { display: block; font-size: 10px; color: var(--neon); margin-bottom: 5px; text-transform: uppercase; }
        .info-data { font-size: 18px; font-weight: 700; }

        .controls {
            display: flex; padding: 20px; gap: 10px;
            background: rgba(15, 15, 15, 0.9);
        }
        button {
            flex: 1; padding: 18px; border-radius: 15px; border: none;
            background: #222; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer;
        }
        button.active { background: var(--neon); color: #000; }

        /* 가로 모드 최적화 */
        @media (orientation: landscape) {
            .container { flex-direction: row; gap: 40px; }
            .info-grid { grid-template-columns: 1fr; width: 180px; }
            .speed-val { font-size: 40vh; }
            .header-clock { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); border: none; }
        }
    </style>
</head>
<body>

    <div class="header-clock">
        <div id="current-time">00:00:00</div>
    </div>

    <div class="container">
        <div class="speed-section">
            <h1 class="speed-val" id="speed">0</h1>
            <span class="unit">KM/H</span>
        </div>

        <div class="info-grid">
            <div class="info-box">
                <span class="info-label">Accuracy</span>
                <strong class="info-data" id="acc">-</strong><small> m</small>
            </div>
            <div class="info-box">
                <span class="info-label">GPS Status</span>
                <strong class="info-data" id="status">OFF</strong>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">START</button>
        <button id="hudBtn">HUD MODE</button>
    </div>

    <script>
        // 시계 업데이트 함수
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('current-time').innerText = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateTime, 1000);
        updateTime(); // 즉시 실행

        // GPS 로직
        let watchId = null;
        const speedEl = document.getElementById('speed');
        const accEl = document.getElementById('acc');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const hudBtn = document.getElementById('hudBtn');

        hudBtn.onclick = () => {
            document.body.classList.toggle('hud-mode');
            hudBtn.classList.toggle('active');
        };

        startBtn.onclick = () => {
            if (watchId === null) {
                if (!navigator.geolocation) return alert("GPS Not Supported");
                
                startBtn.innerText = "STOP";
                startBtn.classList.add('active');
                statusEl.innerText = "SEARCHING";

                watchId = navigator.geolocation.watchPosition((pos) => {
                    const kmh = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
                    speedEl.innerText = kmh;
                    accEl.innerText = Math.round(pos.coords.accuracy);
                    statusEl.innerText = "ACTIVE";
                }, (err) => {
                    statusEl.innerText = "ERROR";
                }, { enableHighAccuracy: true });
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                startBtn.innerText = "START";
                startBtn.classList.remove('active');
                statusEl.innerText = "OFF";
                speedEl.innerText = "0";
            }
        };
    </script>
</body>
</html>
