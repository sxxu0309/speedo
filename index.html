<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Road Dashboard PRO</title>
    <style>
        :root { --neon: #03e9f4; --bg: #000; --card: #161616; --danger: #ff3b30; --road-yellow: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Inter', sans-serif; height: 100vh; 
            display: flex; flex-direction: column; transition: 0.3s; overflow: hidden;
        }
        body.hud-mode { transform: scaleX(-1); }

        /* 과속 시 점멸 애니메이션 */
        @keyframes blink-bg {
            0% { background-color: #000; }
            50% { background-color: #400; }
            100% { background-color: #000; }
        }
        body.overspeed { animation: blink-bg 0.6s infinite; }
        body.overspeed .speed-val { color: var(--danger); text-shadow: 0 0 40px var(--danger); }

        .header-clock { padding: 12px; text-align: center; border-bottom: 1px solid #222; display: flex; justify-content: space-around; }
        .head-info { font-size: 16px; color: #888; letter-spacing: 1px; }

        .container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; gap: 10px; }
        .speed-val { font-size: clamp(110px, 48vw, 300px); font-weight: 900; line-height: 0.8; margin: 0; transition: 0.2s; }
        .unit { font-size: 14px; color: #555; letter-spacing: 0.3em; margin-top: 10px; display: block; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; width: 100%; max-width: 650px; gap: 8px; }
        .info-box { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #222; display: flex; flex-direction: column; justify-content: center; }
        
        /* 제한속도 표지판 스타일 */
        .limit-box { border: 4px solid var(--danger); border-radius: 50%; width: 65px; height: 65px; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; background: #fff; color: #000; }
        #speed-limit { font-size: 24px; font-weight: 900; }

        .full-width { grid-column: span 2; min-height: 85px; }
        .info-label { display: block; font-size: 9px; color: var(--neon); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .info-data { font-size: 17px; font-weight: 700; }
        
        #address { font-size: 16px; color: #fff; margin-bottom: 4px; font-weight: 600; }
        #road-ref { font-size: 14px; color: var(--road-yellow); font-weight: 800; }

        .controls { display: flex; padding: 15px; gap: 10px; background: rgba(10, 10, 10, 0.9); }
        button { flex: 1; padding: 16px; border-radius: 12px; border: none; background: #222; color: #fff; font-weight: bold; cursor: pointer; }
        button.active { background: var(--neon); color: #000; }

        @media (orientation: landscape) {
            .container { flex-direction: row; }
            .info-grid { grid-template-columns: 1fr 1fr; width: 340px; }
        }
    </style>
</head>
<body>

    <div class="header-clock">
        <div class="head-info" id="current-time">00:00:00</div>
        <div class="head-info" id="trip-time">00:00</div>
    </div>

    <div class="container">
        <div class="speed-limit-display">
            <div class="limit-box"><span id="speed-limit">-</span></div>
            <span style="font-size: 10px; color: #888;">LIMIT</span>
        </div>

        <div class="speed-section">
            <h1 class="speed-val" id="speed">0</h1>
            <span class="unit">KM/H</span>
        </div>

        <div class="info-grid">
            <div class="info-box">
                <span class="info-label">Direction</span>
                <strong class="info-data" id="dir">-</strong>
            </div>
            <div class="info-box">
                <span class="info-label">Altitude</span>
                <strong class="info-data" id="alt">-</strong>
            </div>
            <div class="info-box full-width">
                <span class="info-label">Road Information</span>
                <div id="address">Ready</div>
                <div id="road-ref">-</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">START TRIP</button>
        <button id="hudBtn">HUD</button>
    </div>

    <script>
        let watchId = null, startTime = null, lastAddrUpdate = 0;
        let currentLimit = 0; // 현재 도로의 제한속도

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('ko-KR', { hour12: false });
            if (startTime) {
                const diff = Math.floor((now - startTime) / 1000);
                const m = String(Math.floor(diff / 60)).padStart(2, '0');
                const s = String(diff % 60).padStart(2, '0');
                document.getElementById('trip-time').innerText = `${m}:${s}`;
            }
        }
        setInterval(updateClock, 1000);

        async function fetchRoadInfo(lat, lon) {
            if (Date.now() - lastAddrUpdate < 8000) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, {
                    headers: { 'Accept-Language': 'ko-KR' }
                });
                const d = await res.json();
                if (d.address) {
                    const a = d.address;
                    document.getElementById('address').innerText = `${a.province||a.city||""} ${a.county||a.city_district||""} ${a.road||""}`.trim();
                    
                    // 도로 번호 및 이름
                    document.getElementById('road-ref').innerText = a.ref || a.highway || "일반도로";

                    // 제한속도 추출 (OSM maxspeed 태그 활용 시도)
                    if (d.extratags && d.extratags.maxspeed) {
                        currentLimit = parseInt(d.extratags.maxspeed);
                    } else {
                        // 데이터가 없을 경우 도로 종류에 따른 기본값 추정 (참고용)
                        if (a.highway === 'motorway') currentLimit = 100;
                        else if (a.highway === 'trunk') currentLimit = 80;
                        else currentLimit = 50; // 기본 도시 제한속도
                    }
                    document.getElementById('speed-limit').innerText = currentLimit;
                    lastAddrUpdate = Date.now();
                }
            } catch (e) {}
        }

        document.getElementById('startBtn').onclick = function() {
            if (watchId === null) {
                startTime = new Date();
                this.innerText = "END TRIP";
                this.classList.add('active');
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const kmh = Math.round((pos.coords.speed || 0) * 3.6);
                    document.getElementById('speed').innerText = kmh;
                    
                    // 과속 여부 확인 및 점멸 효과
                    if (currentLimit > 0 && kmh > currentLimit) {
                        document.body.classList.add('overspeed');
                    } else {
                        document.body.classList.remove('overspeed');
                    }

                    document.getElementById('alt').innerText = pos.coords.altitude ? Math.round(pos.coords.altitude) + "m" : "-";
                    document.getElementById('dir').innerText = pos.coords.heading ? ['북', '북동', '동', '남동', '남', '남서', '서', '북서'][Math.round(pos.coords.heading / 45) % 8] : "-";
                    fetchRoadInfo(pos.coords.latitude, pos.coords.longitude);
                }, null, { enableHighAccuracy: true });
            } else {
                location.reload();
            }
        };

        document.getElementById('hudBtn').onclick = () => document.body.classList.toggle('hud-mode');
    </script>
</body>
</html>
