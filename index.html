<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adaptive HUD Speedo</title>
    <style>
        :root {
            --neon: #03e9f4;
            --bg: #000;
            --card: #111;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            transition: 0.3s;
        }

        /* HUD 모드: 화면 좌우 반전 */
        body.hud-mode { transform: scaleX(-1); }

        /* 메인 컨테이너 레이아웃 */
        .container {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; gap: 20px;
        }

        /* 속도 표시부 */
        .speed-section { text-align: center; }
        .speed-val { 
            font-size: clamp(100px, 40vw, 300px); 
            font-weight: 900; line-height: 0.8; margin: 0;
            font-variant-numeric: tabular-nums;
        }
        .unit { font-size: clamp(15px, 4vw, 30px); color: #666; letter-spacing: 0.2em; margin-top: 10px; display: block; }

        /* 정보 그리드 */
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            width: 100%; max-width: 500px; gap: 15px;
        }
        .info-box {
            background: var(--card); padding: 15px; border-radius: 15px;
            text-align: center; border: 1px solid #222;
        }
        .info-label { display: block; font-size: 11px; color: var(--neon); margin-bottom: 5px; opacity: 0.8; }
        .info-data { font-size: 18px; font-weight: 700; }

        /* 하단 컨트롤러 */
        .controls {
            display: flex; padding: 20px; gap: 10px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(10px);
        }
        button {
            flex: 1; padding: 18px; border-radius: 15px; border: none;
            background: #222; color: #fff; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.2s;
        }
        button.active { background: var(--neon); color: #000; box-shadow: 0 0 20px rgba(3, 233, 244, 0.3); }

        /* [반응형] 가로 모드 (Landscape) - 자동차 대시보드 스타일 */
        @media (orientation: landscape) {
            .container { flex-direction: row; justify-content: space-around; gap: 50px; }
            .info-grid { grid-template-columns: 1fr; width: 200px; }
            .speed-val { font-size: 35vh; }
        }

        /* [반응형] 태블릿/PC 큰 화면 */
        @media (min-width: 1024px) {
            .container { max-width: 1200px; margin: 0 auto; }
            .speed-val { font-size: 250px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="speed-section">
            <h1 class="speed-val" id="speed">0</h1>
            <span class="unit">KM/H</span>
        </div>

        <div class="info-grid">
            <div class="info-box">
                <span class="info-label">ACCURACY</span>
                <strong class="info-data" id="acc">-</strong><small> m</small>
            </div>
            <div class="info-box">
                <span class="info-label">GPS STATUS</span>
                <strong class="info-data" id="status">OFF</strong>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">측정 시작</button>
        <button id="hudBtn">HUD MODE</button>
    </div>

    <script>
        let watchId = null;
        const speedEl = document.getElementById('speed');
        const accEl = document.getElementById('acc');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const hudBtn = document.getElementById('hudBtn');

        // HUD 토글
        hudBtn.onclick = () => {
            document.body.classList.toggle('hud-mode');
            hudBtn.classList.toggle('active');
        };

        // 측정 시작/중지
        startBtn.onclick = () => {
            if (watchId === null) {
                if (!navigator.geolocation) return alert("GPS를 지원하지 않습니다.");
                
                startBtn.innerText = "중지";
                startBtn.classList.add('active');
                statusEl.innerText = "SEARCHING";

                watchId = navigator.geolocation.watchPosition((pos) => {
                    const kmh = Math.round((pos.coords.speed || 0) * 3.6);
                    speedEl.innerText = kmh;
                    accEl.innerText = Math.round(pos.coords.accuracy);
                    statusEl.innerText = "ACTIVE";
                }, (err) => {
                    statusEl.innerText = "ERROR";
                }, { enableHighAccuracy: true });
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                startBtn.innerText = "측정 시작";
                startBtn.classList.remove('active');
                statusEl.innerText = "OFF";
                speedEl.innerText = "0";
                accEl.innerText = "-";
            }
        };
    </script>
</body>
</html>
