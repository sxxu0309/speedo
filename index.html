<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Speedo & Location</title>
    <style>
        :root {
            --neon: #03e9f4;
            --bg: #000;
            --card: #111;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            transition: 0.3s; overflow: hidden;
        }

        body.hud-mode { transform: scaleX(-1); }

        .header-clock {
            padding: 15px; text-align: center;
            border-bottom: 1px solid #222;
        }
        #current-time {
            font-size: 22px; font-weight: 300; letter-spacing: 2px; color: #aaa;
        }

        .container {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 15px; gap: 15px;
        }

        .speed-section { text-align: center; }
        .speed-val { 
            font-size: clamp(100px, 40vw, 280px); 
            font-weight: 900; line-height: 0.8; margin: 0;
            font-variant-numeric: tabular-nums;
        }
        .unit { font-size: 14px; color: #666; letter-spacing: 0.3em; margin-top: 10px; display: block; }

        /* 정보 그리드 (위치 정보 추가로 3칸으로 확장) */
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            width: 100%; max-width: 500px; gap: 10px;
        }
        .info-box {
            background: var(--card); padding: 12px; border-radius: 12px;
            text-align: center; border: 1px solid #222;
        }
        .full-width { grid-column: span 2; cursor: pointer; transition: 0.2s; }
        .full-width:active { background: #222; }

        .info-label { display: block; font-size: 10px; color: var(--neon); margin-bottom: 3px; text-transform: uppercase; }
        .info-data { font-size: 16px; font-weight: 700; color: #fff; }
        .info-data.location { font-size: 13px; color: #03e9f4; text-decoration: underline; }

        .controls {
            display: flex; padding: 15px; gap: 10px;
            background: rgba(15, 15, 15, 0.9);
        }
        button {
            flex: 1; padding: 16px; border-radius: 12px; border: none;
            background: #222; color: #fff; font-weight: bold; font-size: 15px; cursor: pointer;
        }
        button.active { background: var(--neon); color: #000; }

        /* 가로 모드 레이아웃 */
        @media (orientation: landscape) {
            .container { flex-direction: row; gap: 30px; }
            .info-grid { grid-template-columns: 1fr; width: 220px; }
            .full-width { grid-column: span 1; }
            .speed-val { font-size: 45vh; }
            .header-clock { position: absolute; top: 5px; width: 100%; border: none; }
        }
    </style>
</head>
<body>

    <div class="header-clock">
        <div id="current-time">00:00:00</div>
    </div>

    <div class="container">
        <div class="speed-section">
            <h1 class="speed-val" id="speed">0</h1>
            <span class="unit">KM/H</span>
        </div>

        <div class="info-grid">
            <div class="info-box">
                <span class="info-label">Accuracy</span>
                <strong class="info-data" id="acc">-</strong><small> m</small>
            </div>
            <div class="info-box">
                <span class="info-label">Status</span>
                <strong class="info-data" id="status">OFF</strong>
            </div>
            <div class="info-box full-width" id="location-box">
                <span class="info-label">Current Location (Click for Map)</span>
                <strong class="info-data location" id="coords">Waiting for GPS...</strong>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">START</button>
        <button id="hudBtn">HUD MODE</button>
    </div>

    <script>
        // 시계 로직
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('ko-KR', { hour12: false });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // GPS 로직
        let watchId = null;
        let currentLat = 0;
        let currentLon = 0;

        const speedEl = document.getElementById('speed');
        const accEl = document.getElementById('acc');
        const statusEl = document.getElementById('status');
        const coordsEl = document.getElementById('coords');
        const startBtn = document.getElementById('startBtn');
        const hudBtn = document.getElementById('hudBtn');

        // 좌표 클릭 시 구글 지도로 이동
        document.getElementById('location-box').onclick = () => {
            if (currentLat !== 0) {
                const url = `https://www.google.com/maps?q=${currentLat},${currentLon}`;
                window.open(url, '_blank');
            }
        };

        hudBtn.onclick = () => {
            document.body.classList.toggle('hud-mode');
            hudBtn.classList.toggle('active');
        };

        startBtn.onclick = () => {
            if (watchId === null) {
                if (!navigator.geolocation) return alert("GPS Not Supported");
                
                startBtn.innerText = "STOP";
                startBtn.classList.add('active');
                statusEl.innerText = "SEARCHING";

                watchId = navigator.geolocation.watchPosition((pos) => {
                    const kmh = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
                    currentLat = pos.coords.latitude;
                    currentLon = pos.coords.longitude;

                    speedEl.innerText = kmh;
                    accEl.innerText = Math.round(pos.coords.accuracy);
                    statusEl.innerText = "ACTIVE";
                    coordsEl.innerText = `${currentLat.toFixed(5)}, ${currentLon.toFixed(5)}`;
                }, (err) => {
                    statusEl.innerText = "ERROR";
                    coordsEl.innerText = "Check Permissions";
                }, { enableHighAccuracy: true });
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                startBtn.innerText = "START";
                startBtn.classList.remove('active');
                statusEl.innerText = "OFF";
                speedEl.innerText = "0";
                coordsEl.innerText = "Waiting for GPS...";
            }
        };
    </script>
</body>
</html>
